name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scala: [ "2.12", "2.13" ]
    name: Build & Test (Scala ${{ matrix.scala }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew classes -PscalaVersion=${{ matrix.scala }}

      - name: Test
        run: ./gradlew test -PscalaVersion=${{ matrix.scala }}

      - name: Shadow JAR
        run: ./gradlew shadowJar -PscalaVersion=${{ matrix.scala }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: bson-spark_${{ matrix.scala }}
          path: build/libs/bson-spark_${{ matrix.scala }}-*.jar
